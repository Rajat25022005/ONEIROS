
model:
  backbone: "state-spaces/mamba-130m-hf"
  latent_dim: 256
  k_steps: 8
  ema_tau: 0.999
  vocab_size: 50257
  decoder_hidden: 512
  max_length: 128

state:
  dir: ".hypnos/state"

gate:
  idle_threshold: 30.0
  verbose: true

dream:
  k_steps: 4
  coherence_threshold: 0.3
  consolidation_rate: 0.1
  stability_lambda: 0.01
  max_cycles_per_session: 500
  verbose: true

training:
  batch_size: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 10000
  grad_clip: 1.0
  max_seq_len: 512
  checkpoint_every: 1000
  dataset: "roneneldan/TinyStories"
  log_every: 50
